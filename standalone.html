<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universe 25 — standalone</title>
    <style>
      html, body { margin: 0; height: 100%; background: #070a0f; color: #cdd6e4;
        font: 14px system-ui, sans-serif; }
      .frame { display: flex; flex-direction: column; height: 100vh; padding: 16px; box-sizing: border-box; gap: 10px; }
      h1 { margin: 0; font-size: 16px; font-weight: 600; }
      p { margin: 0; color: #6b7688; font-size: 12px; }
      canvas { flex: 1; width: 100%; border: 1px solid #1c2534; border-radius: 8px; background: #0a0e14; }
      .bar { display: flex; gap: 8px; }
      button { background: #131a26; color: #cdd6e4; border: 1px solid #1c2534;
        border-radius: 6px; padding: 6px 14px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="frame">
      <h1>Universe 25 — running standalone</h1>
      <p>The same ProjectSpec that powers the workbench, embedded on a bare page with no UI framework.</p>
      <canvas id="sim"></canvas>
      <div class="bar">
        <button id="play">Play</button>
        <button id="pause">Pause</button>
        <button id="reset">Reset</button>
      </div>
    </div>

    <script type="module">
      import { runStandalone } from '/src/standalone.ts';
      import { universe25 } from '/src/projects/universe25/index.ts';

      const handle = runStandalone(universe25, document.getElementById('sim'), {
        seed: 'utopia',
        speed: 60,
        autoplay: true,
      });
      document.getElementById('play').onclick = () => handle.play();
      document.getElementById('pause').onclick = () => handle.pause();
      document.getElementById('reset').onclick = () => handle.reset();
    </script>
  </body>
</html>
